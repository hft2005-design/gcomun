<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GC Darío Urzúa</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1F5E7A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#eef2f5;font-family:Arial,sans-serif;padding:20px}
    .card{background:white;border-radius:20px;padding:20px;margin-bottom:20px}
    .hero{background:#1F5E7A;color:white}
    button{background:#2A9D8F;color:white;border:none;padding:10px 20px;border-radius:30px}
    select,button{padding:10px;margin:5px}
    .kpi{display:inline-block;background:white;border-radius:20px;padding:15px;margin:5px;text-align:center}
    .kpi-value{font-size:24px;font-weight:bold;color:#1F5E7A}
    canvas{max-width:100%}
    table{width:100%;border-collapse:collapse}
    td,th{padding:10px;border-bottom:1px solid #ddd}
  </style>
</head>
<body>
<div class="card hero">
  <h1>🏢 Edificio Darío Urzúa · Unidad 502</h1>
  <p>Total = Gasto Común + Fondos + Agua Fría + Agua Caliente</p>
  <div>
    <select id="yearFilter"><option value="all">Todos</option><option value="2025">2025</option><option value="2026">2026</option></select>
    <select id="monthFilter"><option value="all">Todos</option><option value="Mayo">Mayo</option><option value="Junio">Junio</option><option value="Julio">Julio</option><option value="Agosto">Agosto</option><option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option><option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option><option value="Enero">Enero</option><option value="Febrero">Febrero</option><option value="Marzo">Marzo</option><option value="Abril">Abril</option></select>
    <select id="periodFilter"><option value="all">Todo</option><option value="last3">Últimos 3 meses</option><option value="last6">Últimos 6 meses</option><option value="last12">Últimos 12 meses</option></select>
    <button id="resetBtn">Restablecer</button>
  </div>
</div>
<div id="kpis"></div>
<div class="card"><h2>📈 Evolución Total</h2><canvas id="trendChart" height="200"></canvas></div>
<div class="card"><h2>📊 Composición del Gasto</h2><canvas id="stackedChart" height="200"></canvas></div>
<div class="card"><h2>📅 Historial mensual</h2><div style="overflow-x:auto"><table id="monthlyTable"><thead><tr><th>Mes</th><th>Total</th><th>Gasto Base</th><th>F.Reserva</th><th>F.Indemn</th><th>Agua Fría</th><th>Agua Caliente</th></tr></thead><tbody id="monthlyBody"></tbody></table></div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const allData = [
  {year:2025,month:"Mayo",gcBase:123694,fondoReserva:6185,fondoIndemn:4453,aguaFria:9360,aguaCaliente:50692,totalReal:194384},
  {year:2025,month:"Junio",gcBase:123694,fondoReserva:6185,fondoIndemn:4453,aguaFria:9360,aguaCaliente:50692,totalReal:194384},
  {year:2025,month:"Julio",gcBase:132246,fondoReserva:6612,fondoIndemn:4761,aguaFria:6860,aguaCaliente:71423,totalReal:221902},
  {year:2025,month:"Agosto",gcBase:132246,fondoReserva:6612,fondoIndemn:4761,aguaFria:6860,aguaCaliente:71423,totalReal:221902},
  {year:2025,month:"Septiembre",gcBase:140886,fondoReserva:7044,fondoIndemn:5072,aguaFria:9710,aguaCaliente:62210,totalReal:224922},
  {year:2025,month:"Octubre",gcBase:129040,fondoReserva:6452,fondoIndemn:4645,aguaFria:10730,aguaCaliente:50791,totalReal:201658},
  {year:2025,month:"Noviembre",gcBase:136760,fondoReserva:6838,fondoIndemn:4923,aguaFria:9246,aguaCaliente:50937,totalReal:208704},
  {year:2025,month:"Diciembre",gcBase:144370,fondoReserva:7219,fondoIndemn:5197,aguaFria:9034,aguaCaliente:44341,totalReal:210161},
  {year:2026,month:"Enero",gcBase:129040,fondoReserva:6452,fondoIndemn:4645,aguaFria:10718,aguaCaliente:27523,totalReal:178378},
  {year:2026,month:"Febrero",gcBase:113210,fondoReserva:5661,fondoIndemn:4075,aguaFria:10718,aguaCaliente:27523,totalReal:161187},
  {year:2026,month:"Marzo",gcBase:138847,fondoReserva:6942,fondoIndemn:4998,aguaFria:20185,aguaCaliente:72535,totalReal:243507},
  {year:2026,month:"Abril",gcBase:155448,fondoReserva:7772,fondoIndemn:5596,aguaFria:24866,aguaCaliente:75483,totalReal:269165}
];

function filterData(year,month,period){
  let f = [...allData];
  if(year!='all') f = f.filter(d=>d.year==year);
  if(month!='all') f = f.filter(d=>d.month==month);
  if(period=='last3') f = f.slice(-3);
  if(period=='last6') f = f.slice(-6);
  if(period=='last12') f = f.slice(-12);
  return f;
}

let trendChart, stackedChart;

function update(){
  const year = document.getElementById('yearFilter').value;
  const month = document.getElementById('monthFilter').value;
  const period = document.getElementById('periodFilter').value;
  const data = filterData(year,month,period);
  if(!data.length) return;
  
  const avgTotal = data.reduce((a,b)=>a+b.totalReal,0)/data.length;
  document.getElementById('kpis').innerHTML = `<div class="kpi"><div class="kpi-value">$${Math.round(avgTotal).toLocaleString()}</div><div>Promedio Total</div></div>`;
  
  if(trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'),{type:'line',data:{labels:data.map(d=>d.month),datasets:[{label:'Total a Pagar',data:data.map(d=>d.totalReal),borderColor:'#E76F51',fill:true}]}});
  
  if(stackedChart) stackedChart.destroy();
  stackedChart = new Chart(document.getElementById('stackedChart'),{type:'bar',data:{labels:data.map(d=>d.month),datasets:[
    {label:'Gasto Base',data:data.map(d=>d.gcBase),backgroundColor:'#0F5B6E'},
    {label:'F.Reserva',data:data.map(d=>d.fondoReserva),backgroundColor:'#2A9D8F'},
    {label:'F.Indemn',data:data.map(d=>d.fondoIndemn),backgroundColor:'#54C0B0'},
    {label:'Agua Fría',data:data.map(d=>d.aguaFria),backgroundColor:'#8ECAE6'},
    {label:'Agua Caliente',data:data.map(d=>d.aguaCaliente),backgroundColor:'#F4A261'}
  ]},options:{responsive:true}});
  
  document.getElementById('monthlyBody').innerHTML = data.map(m=>`<tr><td>${m.month} ${m.year}</td><td>$${m.totalReal.toLocaleString()}</td><td>$${m.gcBase.toLocaleString()}</td><td>$${m.fondoReserva.toLocaleString()}</td><td>$${m.fondoIndemn.toLocaleString()}</td><td>$${m.aguaFria.toLocaleString()}</td><td>$${m.aguaCaliente.toLocaleString()}</td></tr>`).join('');
}

document.getElementById('yearFilter').onchange = update;
document.getElementById('monthFilter').onchange = update;
document.getElementById('periodFilter').onchange = update;
document.getElementById('resetBtn').onclick = () => {
  document.getElementById('yearFilter').value='all';
  document.getElementById('monthFilter').value='all';
  document.getElementById('periodFilter').value='all';
  update();
};
update();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
